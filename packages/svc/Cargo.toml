[package]
name = "svc"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Quadlet service CLI and terminal dashboard"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
crossterm = "0.29"
libc = "0.2"
ratatui = "0.29"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"
